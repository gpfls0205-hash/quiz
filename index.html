<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>중등 정보 플래시카드 - 손그림 낙서 에디션</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@500;700;900&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ─── 손그림 낙서 디자인 토큰 ─── */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink: #292524; 
  --ink-light: #57534e;
  --bg-color: #fafaf9; 
  --hl-color: rgba(253, 224, 71, 0.7); 
}
body{
  font-family:'Noto Sans KR', sans-serif;
  background-color: var(--bg-color);
  background-image: repeating-linear-gradient(transparent, transparent 27px, #e7e5e4 27px, #e7e5e4 28px);
  padding: 32px 0 60px;
}
.wrap{max-width:520px;margin:0 auto;padding:0 24px;}

/* 삐뚤빼뚤 손그림 테두리 공통 클래스 */
.doodle-box {
  background: #fff;
  border: 2.5px solid var(--ink);
  border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
  box-shadow: 3px 4px 0 rgba(0,0,0,0.06);
}

/* ─── 상단 시스템 바 ─── */
.sys-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.sys-id{font-family: 'Gaegu', cursive; font-size:18px; color:var(--ink); font-weight:700; padding:8px 16px;}
.sys-dot{display:flex;align-items:center;gap:6px;padding:8px 12px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--ink);}
.sys-live{font-family:'Space Mono',monospace;font-size:11px;color:var(--ink);font-weight:700;letter-spacing:.1em;}

/* ─── 단원 탭 ─── */
.deck-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:24px;}
.deck-tab{padding:12px 4px 10px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px; border: 2px solid var(--ink); border-radius: 15px 15px 15px 15px/15px 15px 15px 15px;}
.deck-tab-num{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;line-height:1;}
.deck-tab-name{font-family: 'Gaegu', cursive; font-size:13px; font-weight:700; line-height:1.2; text-align:center; white-space:pre-wrap; color:var(--ink) !important;}
.deck-tab.inactive{background:transparent; border-color:#a8a29e; opacity:0.5; box-shadow:none;}
.deck-tab:not(.inactive){background:var(--hl-color); transform:translateY(-2px); box-shadow: 3px 3px 0 rgba(0,0,0,0.1);}

/* ─── 진행 상태 바 ─── */
.prog-row{display:flex;justify-content:space-between;margin-bottom:8px;font-weight:700;}
.prog-label{font-family:'Gaegu', cursive; font-size:16px; color:var(--ink);}
.prog-track{height:14px;background:#fff;margin-bottom:32px;padding:2px;border: 2px solid var(--ink); border-radius: 20px;}
.prog-fill{height:100%;transition:width .4s cubic-bezier(.4,0,.2,1); border-radius: 20px; background:var(--ink);}

/* ─── 플래시카드 ─── */
.scene{height:360px;perspective:1400px;cursor:pointer;margin-bottom:16px;}
.card-inner{width:100%;height:100%;position:relative;transition:transform .6s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;}
.card-inner.flipped{transform:rotateY(180deg);}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;padding:32px;background:#fff;}
.back{transform:rotateY(180deg);overflow-y:auto;}

/* 앞면 컨텐츠 */
.face-idx{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.1em;margin-bottom:auto;color:var(--ink);align-self:flex-start;border-bottom:2.5px solid var(--ink);padding-bottom:2px;}
.front-content{display:flex;flex-direction:column;justify-content:center;align-items:center;flex:1;margin-top:14px;}
.card-word{font-family: 'Gaegu', cursive; position:relative;display:inline-block;z-index:1;font-size:46px;font-weight:700;color:var(--ink);line-height:1.1;margin-bottom:16px;white-space:pre-wrap;word-break:keep-all;text-align:center;}
.card-word::after {
  content: ''; position: absolute; bottom: 4px; left: -5%; width: 110%; height: 14px;
  background: var(--hl-color); border-radius: 10px; transform: rotate(-1.5deg); z-index: -1;
}
.card-sub{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--ink-light);letter-spacing:.05em;}

/* 뒷면 컨텐츠 */
.back-content{display:flex;flex-direction:column;gap:18px;flex:1;margin-top:10px;}
.info-label{align-self:flex-start;padding:2px 8px;border:1.5px solid var(--ink); border-radius: 10px; background:var(--hl-color);color:var(--ink);font-size:12px;font-weight:900;font-family:'Space Mono',monospace;margin-bottom:6px;}
.info-text{font-family: 'Gaegu', cursive; font-size:21px; font-weight:700; line-height:1.45; color:var(--ink); word-break:keep-all;}
.info-text.ex{font-size:17px; font-weight:400; color:var(--ink-light); border-left:2.5px dashed var(--ink); padding-left:12px; margin-top:4px; font-family: 'Noto Sans KR', sans-serif;}
.back-term{font-family:'Gaegu', cursive; font-size:16px; font-weight:700; margin-top:auto; color:var(--ink-light); text-align:center; opacity:0.6;}

.tap-hint{font-family:'Gaegu', cursive; font-size:16px; font-weight:700; color:var(--ink-light); text-align:center; margin-bottom:24px; height:14px;}

/* ─── 네비게이션 버튼 ─── */
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.nav-btn{width:50px;height:50px;color:var(--ink);font-size:22px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.nav-btn:hover:not(:disabled){transform:translateY(-2px);background:var(--hl-color);}
.nav-btn:disabled{opacity:0.3;cursor:default;}
.flip-btn{font-family: 'Gaegu', cursive; font-size:20px; font-weight:700; padding:12px 32px; color:var(--ink); cursor:pointer; transition:all .2s;}
.flip-btn:hover{transform:translateY(-2px);background:var(--hl-color);}

/* ─── 통계 정보 ─── */
.stats{display:flex;margin-bottom:24px;background:#fff; border-radius: 20px;}
.stat{flex:1;padding:18px 12px;text-align:center;border-right:1.5px dashed var(--ink);}
.stat:last-child{border-right:none;}
.stat-n{font-family:'Gaegu', cursive; font-size:28px; font-weight:700; color:var(--ink); line-height:1;}
.stat-l{font-family:'Gaegu', cursive; font-size:14px; font-weight:700; color:var(--ink-light); margin-top:4px;}

.test-start-btn{width:100%;padding:18px;font-family:'Gaegu', cursive; font-size:22px; font-weight:700; color:var(--ink); cursor:pointer; transition:all .2s; display:none; background:var(--hl-color);}
.test-start-btn.show{display:block;}
.test-start-btn:hover{transform:translateY(-2px); background:#fde047;}

/* ─── 퀴즈 및 결과 ─── */
#quizView{display:none;}
.quiz-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.quiz-back{font-family:'Gaegu', cursive; font-size:18px; font-weight:700; color:var(--ink); cursor:pointer; padding:8px 16px; transition:all .2s;}
.quiz-title{font-family:'Gaegu', cursive; font-size:20px; font-weight:700; color:var(--ink);}
.quiz-card{position:relative;padding:36px 28px;margin-bottom:20px;}
.quiz-num-badge{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;padding:4px 10px;border-bottom:2px solid var(--ink);display:inline-block;margin-bottom:16px;}
.quiz-q{font-family:'Gaegu', cursive; font-size:22px; font-weight:700; color:var(--ink); line-height:1.4; word-break:keep-all;}
.quiz-hint{font-family:'Noto Sans KR', sans-serif; font-size:14px; font-weight:500; color:var(--ink-light); line-height:1.6; margin-top:14px; word-break:keep-all; border-left:2px dashed var(--ink); padding-left:12px;}
.quiz-opts{display:flex;flex-direction:column;gap:12px;margin-top:24px;}
.quiz-opt{font-family:'Gaegu', cursive; padding:16px; font-size:20px; font-weight:700; color:var(--ink); cursor:pointer; text-align:left; transition:all .2s; display:flex; align-items:center; gap:14px;}
.quiz-opt.correct{background:rgba(167,243,208,0.6); border-color:#059669; border-width:2.5px;}
.quiz-opt.wrong{background:rgba(254,205,211,0.6); border-color:#e11d48; border-width:2.5px;}
.quiz-opt.disabled{cursor:default;}
.opt-num{width:28px;height:28px;border:1.5px solid var(--ink); border-radius: 255px 15px 225px 15px/15px 225px 15px 255px; color:var(--ink);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;flex-shrink:0;}
.quiz-next-btn{font-family:'Gaegu', cursive; font-size:20px; font-weight:700; padding:14px 32px; color:var(--ink); cursor:pointer; display:none; background:var(--hl-color); margin-left:auto;}
.quiz-next-btn.show{display:block;}

#resultView{display:none;}
.result-card{padding:56px 20px 40px;text-align:center;margin-bottom:24px;}
.result-score{font-family:'Gaegu', cursive; font-size:80px; font-weight:700; color:var(--ink); position:relative; display:inline-block; z-index:1;}
.result-score::after{content:'';position:absolute;bottom:10px;left:-5%;width:110%;height:25px;background:var(--hl-color);z-index:-1; border-radius: 10px;}
.result-label{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;color:var(--ink);margin-bottom:24px;display:block;}
.result-msg{font-family:'Gaegu', cursive; font-size:24px; font-weight:700; color:var(--ink); margin-top:10px;}

.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.result-box{padding:20px;text-align:center;}
.result-box-n{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;color:var(--ink);}
.result-box-l{font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;color:var(--ink-light);margin-top:6px;}

.result-btns{display:flex;flex-direction:column;gap:12px;}
.result-btn{font-family:'Gaegu', cursive; padding:18px; font-size:20px; font-weight:700; cursor:pointer;}
.result-btn.primary{background:var(--hl-color);}
</style>
</head>
<body>
<div class="wrap">
  <div class="sys-bar doodle-box">
    <span class="sys-id">중학교 정보_양혜린</span>
    <div class="sys-dot"><div class="dot"></div><span class="sys-live">STUDY</span></div>
  </div>
  
  <div class="deck-grid" id="deckGrid"></div>
  
  <div class="prog-row">
    <span class="prog-label" id="deckFull"></span>
    <span class="prog-label" id="progLabel"></span>
  </div>
  <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>

  <div id="flashView">
    <div class="scene" onclick="flip()">
      <div class="card-inner" id="inner">
        <div class="face front doodle-box">
          <div class="face-idx" id="fidx"></div>
          <div class="front-content">
            <div class="card-word" id="fw"></div>
            <div class="card-sub" id="fs"></div>
          </div>
        </div>
        <div class="face back doodle-box" id="backFace">
          <div class="face-idx" id="bidx"></div>
          <div class="back-content">
            <div>
              <div class="info-label">CONCEPT</div>
              <div class="info-text" id="bd"></div>
            </div>
            <div id="exWrap">
              <div class="info-label">DEFINITION</div>
              <div class="info-text ex" id="be"></div>
            </div>
            <div class="back-term" id="bt"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="tap-hint" id="tapHint">TAP TO REVEAL</div>
    
    <div class="nav-row">
      <button class="nav-btn doodle-box" id="prevB" onclick="go(-1)">&#8592;</button>
      <button class="flip-btn doodle-box" onclick="flip()">FLIP CARD</button>
      <button class="nav-btn doodle-box" id="nextB" onclick="go(1)">&#8594;</button>
    </div>
    
    <div class="stats doodle-box">
      <div class="stat"><div class="stat-n" id="sTotal">0</div><div class="stat-l">TOTAL</div></div>
      <div class="stat" id="sSeenBox" style="background: var(--hl-color);"><div class="stat-n" id="sSeen">0</div><div class="stat-l">STUDIED</div></div>
      <div class="stat"><div class="stat-n" id="sDone">0</div><div class="stat-l">DONE</div></div>
    </div>
    <button class="test-start-btn doodle-box" id="testStartBtn" onclick="startQuiz()">QUIZ START →</button>
  </div>

  <div id="quizView">
    <div class="quiz-header">
      <button class="quiz-back doodle-box" onclick="backToFlash()">← BACK</button>
      <span class="quiz-title" id="quizTitle"></span>
    </div>
    <div class="quiz-card doodle-box">
      <div class="quiz-num-badge" id="qBadge" style="font-family: 'Space Grotesk'; font-size: 14px; font-weight: 700;"></div>
      <div class="quiz-q" id="qText">다음 설명에 해당하는 개념어는?</div>
      <div class="quiz-hint" id="qHint"></div>
      <div class="quiz-opts" id="qOpts"></div>
    </div>
    <div style="display: flex; justify-content: flex-end; margin-top: 10px;">
      <button class="quiz-next-btn doodle-box" id="qNextBtn" onclick="nextQ()">NEXT →</button>
    </div>
  </div>

  <div id="resultView">
    <div class="result-card doodle-box">
      <span class="result-label">FINAL SCORE</span><br>
      <div class="result-score" id="rScore"></div>
      <div class="result-msg" id="rMsg"></div>
    </div>
    <div class="result-grid">
      <div class="result-box doodle-box"><div class="result-box-n" id="rCorrect"></div><div class="result-box-l">CORRECT</div></div>
      <div class="result-box doodle-box"><div class="result-box-n" id="rWrong"></div><div class="result-box-l">WRONG</div></div>
    </div>
    <div class="result-btns">
      <button class="result-btn primary doodle-box" onclick="retryQuiz()">RETRY QUIZ</button>
      <button class="result-btn doodle-box" onclick="backToFlash()">BACK TO CARDS</button>
    </div>
  </div>
</div>

<script>
const COLORS=[
  {bg:'#fef08a',text:'#713f12',accent:'#fef08a'}, 
  {bg:'#a7f3d0',text:'#064e3b',accent:'#a7f3d0'}, 
  {bg:'#bfdbfe',text:'#1e3a8a',accent:'#bfdbfe'}, 
  {bg:'#fbcfe8',text:'#831843',accent:'#fbcfe8'}, 
  {bg:'#e9d5ff',text:'#581c87',accent:'#e9d5ff'}, 
];

// 원본 전체 데이터 (총 105개)[cite: 1]
const decks=[
  {id:'01',name:'컴퓨팅\n시스템',full:'1단원: 컴퓨팅 시스템',cards:[
    {w:'시스템',sub:'System',d:'여러 부분이 서로 맞물려 작동하거나 하나로 연결되어 공통적인 목적을 수행하도록 설계한 것을 말한다.',ex:'모바일 결제 시스템은 스마트폰, 스마트워치 등 모바일 기기를 통해 온·오프라인에서 결제할 수 있도록 만든 방식이다.'},
    {w:'터치스크린',sub:'Touch screen',d:'접촉 방식의 디스플레이 장치로, 사용자의 손이나 펜이 화면의 문자나 그림에 닿으면 명령이 실행되는 입력 장치이다.',ex:'터치스크린은 스마트폰, 내비게이션, 현금 자동 인출기(ATM), 키오스크(kiosk) 등에 사용된다.'},
    {w:'컴퓨팅',sub:'Computing',d:'컴퓨터를 활용해서 문제를 해결하거나 데이터를 처리하는 것을 뜻한다.',ex:'컴퓨팅 사고력은 컴퓨터가 복잡한 문제를 단순화하여 논리적이고 효율적으로 해결하는 방식을 적용한 사고 능력이다.'},
    {w:'컴퓨팅\n시스템',sub:'Computing System',d:'컴퓨터가 문제를 해결하고 데이터를 처리할 수 있도록 구성한 하드웨어와 소프트웨어의 모음이다.',ex:'클라우드 컴퓨팅 시스템은 인터넷을 통해 컴퓨터의 하드웨어와 데이터, 소프트웨어를 제공하고 사용하는 시스템이다.'},
    {w:'하드웨어',sub:'Hardware',d:'컴퓨팅 시스템을 구성하는 기계 장치이다.',ex:'하드웨어는 입력 장치, 출력 장치, 처리 장치, 기억 장치, 통신 장치로 구성된다.'},
    {w:'소프트웨어',sub:'Software',d:'하드웨어를 관리하고 명령을 내리는 프로그램이다.',ex:'소프트웨어는 시스템 소프트웨어와 응용 소프트웨어로 나눌 수 있다.'},
    {w:'램(RAM)',sub:'Random Access Memory',d:'임의의 영역에 접근하여 읽고 쓰기가 가능한 주기억 장치이다. 전원이 차단되면 내용이 모두 지워지는 휘발성 메모리이다.',ex:''},
    {w:'SSD',sub:'Solid State Drive',d:'반도체 메모리를 이용해 데이터를 빠르게 저장하는 보조 기억 장치이다.',ex:'SSD는 HDD에 비해 데이터를 빠르게 찾아 읽고 쓰고 저장할 수 있다.'},
    {w:'하드 디스크\n(HDD)',sub:'Hard Disk Drive',d:'자성 물질로 얇게 코팅된 원형 디스크(플래터)에 데이터를 저장하는 보조 기억 장치이다.',ex:'HDD는 헤드, 플래터, 모터, 액츄에이터 암으로 구성되어 있다.'},
    {w:'중앙 처리\n장치(CPU)',sub:'Central Processing Unit',d:'컴퓨팅 시스템 전체를 제어하고 연산을 하는 장치이다.',ex:'중앙 처리 장치는 주기억 장치에 저장된 자료와 프로그램을 실행한다.'},
    {w:'그래픽 처리\n장치(GPU)',sub:'Graphics Processing Unit',d:'컴퓨터 시스템에서 영상 데이터를 빠르게 처리하여 모니터에 출력하는 연산 장치이다.',ex:'GPU는 게임에서 그래픽 처리를 담당하며 높은 그래픽 품질을 제공한다.'},
    {w:'랜 카드',sub:'LAN Card',d:'컴퓨터와 외부 네트워크를 연결해 데이터를 주고받을 수 있게 해 주는 장치이다.',ex:'랜 카드를 통해 유선 인터넷에 연결할 수 있고 다양한 정보를 얻을 수 있다.'},
    {w:'시스템\n소프트웨어',sub:'System Software',d:'사용자가 컴퓨팅 시스템의 하드웨어와 소프트웨어를 효율적으로 운영·관리하도록 도와주는 소프트웨어이다.',ex:'시스템 소프트웨어에는 운영 체제, 펌웨어, 언어 번역 프로그램, 장치 드라이버 등이 있다.'},
    {w:'응용\n소프트웨어',sub:'Application Software',d:'사용자가 컴퓨팅 시스템을 이용해 특정 작업을 수행할 수 있도록 도와주는 소프트웨어이다.',ex:'게임, 영상 편집, 음악, 그래픽 디자인 프로그램은 응용 소프트웨어이다.'},

let di=0,ci=0,flipped=false,seen=new Set(),done=new Set();
let quizQs=[],qi=0,qScore=0,answered=false;

function pad(n){return String(n).padStart(2,'0');}

function render(){
  const deck=decks[di],card=deck.cards[ci],n=deck.cards.length;
  document.getElementById('fw').textContent=card.w;
  document.getElementById('fs').textContent=card.sub;
  document.getElementById('bd').textContent=card.d;
  const exWrap=document.getElementById('exWrap');
  const beEl=document.getElementById('be');
  if(card.ex){exWrap.style.display='block';beEl.textContent=card.ex;}
  else{exWrap.style.display='none';}
  document.getElementById('bt').textContent=card.w.replace('\n',' ');
  document.getElementById('fidx').textContent='CONCEPT · '+deck.id;
  document.getElementById('bidx').textContent='DEFINITION · '+deck.id;
  document.getElementById('deckFull').textContent=deck.full;
  document.getElementById('progLabel').textContent=pad(ci+1)+' / '+pad(n);
  document.getElementById('progFill').style.width=((ci+1)/n*100)+'%';
  document.getElementById('prevB').disabled=(ci===0);
  document.getElementById('nextB').disabled=(ci===n-1);
  seen.add(di+'-'+ci);
  document.getElementById('sTotal').textContent=n;
  document.getElementById('sSeen').textContent=seen.size;
  document.getElementById('sDone').textContent=done.size;
  document.getElementById('inner').classList.remove('flipped');
  flipped=false;
  document.getElementById('tapHint').textContent='TAP TO REVEAL';
  
  const c=COLORS[di];
  document.getElementById('progFill').style.background=c.accent;
  document.getElementById('sSeenBox').style.background=c.accent;
  document.getElementById('testStartBtn').style.background=c.accent;
  
  const btn=document.getElementById('testStartBtn');
  if(ci===n-1){btn.classList.add('show');}else{btn.classList.remove('show');}
}

function flip(){
  flipped=!flipped;
  document.getElementById('inner').classList.toggle('flipped',flipped);
  document.getElementById('tapHint').textContent=flipped?'TAP TO RETURN':'TAP TO REVEAL';
  if(flipped){done.add(di+'-'+ci); document.getElementById('sDone').textContent=done.size;}
}

function go(d){
  ci=Math.max(0,Math.min(decks[di].cards.length-1,ci+d));
  render();
}

function buildGrid(){
  const g=document.getElementById('deckGrid'); g.innerHTML='';
  decks.forEach((d,i)=>{
    const c=COLORS[i];
    const b=document.createElement('button');
    b.className='deck-tab doodle-box'+(i===di?'':' inactive');
    if(i===di) { b.style.background=c.bg; }
    b.innerHTML=`<span class="deck-tab-num">${d.id}</span><span class="deck-tab-name">${d.name}</span>`;
    b.onclick=()=>{di=i;ci=0;seen=new Set();done=new Set();render();buildGrid();};
    g.appendChild(b);
  });
}

function makeQuiz(deck){
  const cards=[...deck.cards].sort(()=>Math.random()-.5);
  const qs=cards.slice(0,Math.min(10,cards.length));
  return qs.map(card=>{
    const wrong=deck.cards.filter(c=>c.w!==card.w).sort(()=>Math.random()-.5).slice(0,3);
    const opts=[card,...wrong].sort(()=>Math.random()-.5);
    return {hint:card.d,opts:opts.map(o=>o.w.replace('\n','')),ans:opts.findIndex(o=>o.w===card.w)};
  });
}

function startQuiz(){
  quizQs=makeQuiz(decks[di]);qi=0;qScore=0;answered=false;
  document.getElementById('flashView').style.display='none';
  document.getElementById('resultView').style.display='none';
  document.getElementById('quizView').style.display='block';
  document.getElementById('quizTitle').textContent=decks[di].full;
  renderQ();
}

function renderQ(){
  const c=COLORS[di];
  const q=quizQs[qi]; answered=false;
  document.getElementById('qNextBtn').classList.remove('show');
  document.getElementById('qBadge').textContent=pad(qi+1)+' / '+pad(quizQs.length);
  const opts=document.getElementById('qOpts'); opts.innerHTML='';
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button'); 
    b.className='quiz-opt doodle-box'; 
    b.innerHTML=`<span class="opt-num">${i+1}</span>${o}`;
    b.onclick=()=>answerQ(i,b,q.ans);
    opts.appendChild(b);
  });
  document.getElementById('qHint').textContent=q.hint;
}

function answerQ(i,btn,ans){
  if(answered)return; answered=true;
  const btns=document.querySelectorAll('.quiz-opt');
  btns.forEach(b=>b.classList.add('disabled'));
  if(i===ans){btn.classList.add('correct'); qScore++;}
  else{btn.classList.add('wrong'); btns[ans].classList.add('correct');}
  
  if(qi<quizQs.length-1){
    const nextBtn=document.getElementById('qNextBtn');
    nextBtn.classList.add('show');
    nextBtn.style.background=COLORS[di].accent;
  }
  else{setTimeout(showResult,900);}
}

function nextQ(){qi++; renderQ();}

function showResult(){
  document.getElementById('quizView').style.display='none';
  document.getElementById('resultView').style.display='block';
  const c=COLORS[di];
  const pct=Math.round(qScore/quizQs.length*100);
  document.getElementById('rScore').textContent=pct+'점';
  document.getElementById('rCorrect').textContent=qScore+'개';
  document.getElementById('rWrong').textContent=(quizQs.length-qScore)+'개';
  const msgs=['다시 한 번 도전해봐요!','조금 더 복습이 필요해요.','꽤 잘했어요!','훌륭해요!','완벽해요!'];
  document.getElementById('rMsg').textContent=msgs[pct<40?0:pct<60?1:pct<75?2:pct<90?3:4];
  
  const retryBtn=document.querySelector('.result-btn.primary');
  retryBtn.style.background=c.accent;
}

function retryQuiz(){ document.getElementById('resultView').style.display='none'; startQuiz(); }
function backToFlash(){
  document.getElementById('quizView').style.display='none';
  document.getElementById('resultView').style.display='none';
  document.getElementById('flashView').style.display='block';
  render();
}

buildGrid(); render();
</script>
